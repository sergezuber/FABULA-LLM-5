<svg viewBox="0 0 1450 830" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="How FABULA works — one piece of work rides the verification railway; every gate must go green before the Proof-of-Done ticket is stamped VERIFIED">
