<defs>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4"/></filter>
</defs>
<rect width="1450" height="830" fill="#0A0C10"/>

<!-- header -->
<text x="88" y="78" font-size="30" font-weight="700" fill="#EDF2F7" letter-spacing="7">HOW FABULA WORKS</text>
<text x="1362" y="78" text-anchor="end" font-size="15" fill="#8B95A3">any model in · proven work out</text>
<line x1="88" y1="100" x2="1362" y2="100" stroke="#1C2530" stroke-width="1.5"/>

<!-- rail -->
<line x1="258" y1="430" x2="1248" y2="430" stroke="#33405299" stroke-width="3"/>

<!-- upper loops -->

  <path d="M 660 430 C 660 367.3, 624.525 316, 595.5 316 C 563.25 316, 541.75 316, 509.5 316 C 480.475 316, 445 367.3, 445 430" fill="none" stroke="#A78BFA" stroke-width="1.6" stroke-dasharray="3 6" opacity="0.55"/>
  <g class="fEscalate">
    <text x="596" y="273" text-anchor="middle" font-size="17" font-weight="700" fill="#A78BFA" letter-spacing="2">ESCALATE</text>
    <text x="596" y="291" text-anchor="middle" font-size="13.5" fill="#8B95A3">stuck → one cloud hint, the</text><text x="596" y="308" text-anchor="middle" font-size="13.5" fill="#8B95A3">local model keeps driving</text>
  </g>

  <path d="M 1175 430 C 1175 301.29999999999995, 1132.1 196, 1097 196 C 1058 196, 562 196, 523 196 C 487.9 196, 445 301.29999999999995, 445 430" fill="none" stroke="#4FD1C5" stroke-width="1.6" stroke-dasharray="3 6" opacity="0.55"/>
  <g class="fNf">
    <text x="812" y="153" text-anchor="middle" font-size="17" font-weight="700" fill="#4FD1C5" letter-spacing="2">NOT FULFILLED</text>
    <text x="812" y="171" text-anchor="middle" font-size="13.5" fill="#8B95A3">the judge refuses the stop →</text><text x="812" y="188" text-anchor="middle" font-size="13.5" fill="#8B95A3">keep working</text>
  </g>

<!-- lower loops -->

  <path d="M 660 430 C 660 494.9, 624.525 548, 595.5 548 C 563.25 548, 541.75 548, 509.5 548 C 480.475 548, 445 494.9, 445 430" fill="none" stroke="#D9A03F" stroke-width="1.6" stroke-dasharray="3 6" opacity="0.55"/>
  <g class="fRewind">
    <text x="596" y="574" text-anchor="middle" font-size="17" font-weight="700" fill="#D9A03F" letter-spacing="2">REWIND</text>
    <text x="596" y="593" text-anchor="middle" font-size="13.5" fill="#8B95A3">red ×N → back to the</text><text x="596" y="610" text-anchor="middle" font-size="13.5" fill="#8B95A3">last green checkpoint</text>
  </g>

  <path d="M 875 430 C 875 543.3, 832.1 636, 797 636 C 758 636, 562 636, 523 636 C 487.9 636, 445 543.3, 445 430" fill="none" stroke="#D9A03F" stroke-width="1.6" stroke-dasharray="3 6" opacity="0.55"/>
  <g class="fNyd">
    <text x="668" y="662" text-anchor="middle" font-size="17" font-weight="700" fill="#D9A03F" letter-spacing="2">NOT YET DONE</text>
    <text x="668" y="681" text-anchor="middle" font-size="13.5" fill="#8B95A3">green tests are not enough —</text><text x="668" y="698" text-anchor="middle" font-size="13.5" fill="#8B95A3">back to work</text>
  </g>

  <path d="M 1030 430 C 1030 592.8, 987.1 726, 952 726 C 913 726, 562 726, 523 726 C 487.9 726, 445 592.8, 445 430" fill="none" stroke="#D9A03F" stroke-width="1.6" stroke-dasharray="3 6" opacity="0.55"/>
  <g class="fQuiz">
    <text x="745" y="752" text-anchor="middle" font-size="17" font-weight="700" fill="#D9A03F" letter-spacing="2">FAILED THE QUIZ</text>
    <text x="745" y="771" text-anchor="middle" font-size="13.5" fill="#8B95A3">doesn't know its diff →</text><text x="745" y="788" text-anchor="middle" font-size="13.5" fill="#8B95A3">back to work</text>
  </g>

<!-- socket -->
<rect x="88" y="354" width="170" height="152" rx="14" fill="#10151D" stroke="#33405299" stroke-width="1.5"/>
<text x="173" y="384" text-anchor="middle" font-size="14" fill="#8B95A3" letter-spacing="2">ANY MODEL IN</text>
<rect x="110" y="402" width="126" height="34" rx="17" fill="#0A0C10" stroke="#EDF2F7" stroke-width="1.4"/>
<text x="173" y="424" text-anchor="middle" font-size="15" fill="#EDF2F7">local 35B</text>
<text x="173" y="472" text-anchor="middle" font-size="12.5" fill="#8B95A3">a swappable chip</text>

<!-- context os -->
<rect x="292" y="338" width="120" height="58" rx="10" fill="#10151D" stroke="#2A3442" stroke-width="1.5" class="fCtx"/>
<text x="352" y="361" text-anchor="middle" font-size="13.5" fill="#EDF2F7" letter-spacing="1.5">CONTEXT OS</text>
<text x="352" y="379" text-anchor="middle" font-size="11.5" fill="#8B95A3">router · kernel</text>
<text x="352" y="393" text-anchor="middle" font-size="11.5" fill="#8B95A3">−40% prefix</text>

<!-- stations -->

  <circle cx="445" cy="430" r="14" fill="#0A0C10" stroke="#2A3442" stroke-width="2.5" class="rEdit"/>
  <circle cx="445" cy="430" r="4.5" fill="#EDF2F7"/>
  <text x="445" y="474" text-anchor="middle" font-size="21" font-weight="700" fill="#EDF2F7" letter-spacing="2">EDIT</text>
  <text x="445" y="496" text-anchor="middle" font-size="14" fill="#8B95A3">diffs · tests</text>

  <circle cx="660" cy="430" r="14" fill="#0A0C10" stroke="#2A3442" stroke-width="2.5" class="rVerify"/>
  <circle cx="660" cy="430" r="4.5" fill="#EDF2F7"/>
  <text x="660" y="474" text-anchor="middle" font-size="21" font-weight="700" fill="#EDF2F7" letter-spacing="2">VERIFY</text>
  <text x="660" y="496" text-anchor="middle" font-size="14" fill="#8B95A3">runs the tests</text>

  <circle cx="875" cy="430" r="14" fill="#0A0C10" stroke="#2A3442" stroke-width="2.5" class="rRepro"/>
  <circle cx="875" cy="430" r="4.5" fill="#EDF2F7"/>
  <text x="875" y="474" text-anchor="middle" font-size="21" font-weight="700" fill="#EDF2F7" letter-spacing="2">REPRODUCE</text>
  <text x="875" y="496" text-anchor="middle" font-size="14" fill="#8B95A3">fix needs a test</text>

  <circle cx="1030" cy="430" r="14" fill="#0A0C10" stroke="#2A3442" stroke-width="2.5" class="rQuiz"/>
  <circle cx="1030" cy="430" r="4.5" fill="#EDF2F7"/>
  <text x="1030" y="474" text-anchor="middle" font-size="21" font-weight="700" fill="#EDF2F7" letter-spacing="2">QUIZ</text>
  <text x="1030" y="496" text-anchor="middle" font-size="14" fill="#8B95A3">knows its diff</text>

  <circle cx="1175" cy="430" r="14" fill="#0A0C10" stroke="#2A3442" stroke-width="2.5" class="rJudge"/>
  <circle cx="1175" cy="430" r="4.5" fill="#EDF2F7"/>
  <text x="1175" y="474" text-anchor="middle" font-size="21" font-weight="700" fill="#EDF2F7" letter-spacing="2">JUDGE</text>
  <text x="1175" y="496" text-anchor="middle" font-size="14" fill="#8B95A3">may the turn end?</text>

<!-- ticket -->
<rect x="1248" y="318" width="198" height="254" rx="14" fill="#10151D" stroke="#33405299" stroke-width="2" class="fTicket"/>
<text x="1266" y="348" font-size="15" font-weight="700" fill="#EDF2F7" letter-spacing="1.5">PROOF-OF-DONE</text>
<g class="fLines" fill="#8B95A3" font-size="11.5">
  <text x="1266" y="376">model in the socket</text>
  <text x="1266" y="396">gates fired · patch</text>
  <text x="1266" y="416">context fingerprint</text>
  <text x="1266" y="436">replay · byte-stability</text>
</g>
<text x="1266" y="464" font-size="11.5" fill="#7EE787">$ fabula receipt verify</text>
<g class="fStamp">
  <circle cx="1347" cy="506" r="50" fill="#0A0C10" opacity="0.6"/>
  <circle cx="1347" cy="506" r="50" fill="none" stroke="#3FB950" stroke-width="3.5" opacity="0.9"/>
  <circle cx="1347" cy="506" r="42" fill="none" stroke="#3FB950" stroke-width="1.2" opacity="0.5"/>
  <text x="1347" y="513" text-anchor="middle" font-size="19" font-weight="700" fill="#3FB950" letter-spacing="2">VERIFIED</text>
</g>

