  @keyframes fRewind{0%{opacity:.45}17.523%{opacity:.45}18.731%{opacity:1}24.773%{opacity:1}26.284%{opacity:.45}100%{opacity:.45}}@keyframes fEscalate{0%{opacity:.45}28.399%{opacity:.45}29.607%{opacity:1}36.254%{opacity:1}37.764%{opacity:.45}100%{opacity:.45}}@keyframes fNyd{0%{opacity:.45}44.109%{opacity:.45}45.317%{opacity:1}51.964%{opacity:1}53.474%{opacity:.45}100%{opacity:.45}}@keyframes fQuiz{0%{opacity:.45}60.725%{opacity:.45}61.934%{opacity:1}69.184%{opacity:1}70.695%{opacity:.45}100%{opacity:.45}}@keyframes fNf{0%{opacity:.45}78.248%{opacity:.45}79.456%{opacity:1}85.801%{opacity:1}87.311%{opacity:.45}100%{opacity:.45}}
